package:
  name: lnd
  version: 0.20.1_beta
  epoch: 0
  description: Lightning Network Daemon
  copyright:
    - license: MIT

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - build-base
      - busybox
      - go
      - gpg
      - gpg-agent
      - wget

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/lightningnetwork/lnd.git
      tag: v0.20.1-beta

  - runs: |
      VER="${{package.version}}"
      UPSTREAM_VER="${VER/_/-}"

      wget -qO roasbeef.asc "https://raw.githubusercontent.com/lightningnetwork/lnd/master/scripts/keys/roasbeef.asc"

      export GNUPGHOME="$(mktemp -d)"
      trap 'rm -rf "$GNUPGHOME"' EXIT

      gpg --import roasbeef.asc
      
      git verify-tag v$UPSTREAM_VER

  - runs: |
      GOPATH="/tmp/go" \
      NO_PROXY="*" \
      make release-install

      mkdir -p "${{targets.destdir}}/usr/bin"
      cp /tmp/go/bin/lncli "${{targets.destdir}}/usr/bin/lncli"
      cp /tmp/go/bin/lnd   "${{targets.destdir}}/usr/bin/lnd"

      strip "${{targets.destdir}}/usr/bin/lncli" "${{targets.destdir}}/usr/bin/lnd"

update:
  enabled: true
  github:
    identifier: lightningnetwork/lnd
    use-tag: true
    tag-filter-prefix: v0.20.
    strip-prefix: v
  version-transform:
    - match: "-"
      replace: _
