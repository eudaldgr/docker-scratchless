package:
  name: vaultwarden
  version: 1.36.0 # renovate: datasource=github-releases depName=dani-garcia/vaultwarden
  epoch: 1
  description: Unofficial Bitwarden-compatible server written in Rust
  copyright:
    - license: AGPL-3.0-only

vars:
  web-vault-version: 2026.4.1 # renovate: datasource=docker depName=vaultwarden/web-vault

environment:
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - bash
      - build-base
      - busybox
      - crane
      - curl
      - jq
      - mariadb-connector-c-dev
      - openssl-dev
      - pkgconf
      - postgresql-18-dev
      - rust
      - scanelf
      - sqlite-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dani-garcia/vaultwarden
      tag: ${{package.version}}

  - runs: |
      grep -q '^sqlite_system[[:space:]]*=' Cargo.toml || {
        echo "sqlite_system feature not found in Cargo.toml" >&2
        exit 1
      }

      grep -q '^sqlite[[:space:]]*=.*"libsqlite3-sys/bundled"' Cargo.toml || {
        echo "expected bundled sqlite feature flag not found" >&2
        exit 1
      }

      sed -i \
        -e '/^sqlite[[:space:]]*=/ s/"libsqlite3-sys\/bundled"[[:space:]]*,[[:space:]]*//' \
        -e '/^sqlite[[:space:]]*=/ s/,[[:space:]]*"libsqlite3-sys\/bundled"//' \
        Cargo.toml

      grep -q '^sqlite[[:space:]]*=.*"sqlite_system"' Cargo.toml || {
        echo "sqlite feature no longer enables sqlite_system" >&2
        exit 1
      }

      ! grep -q '^sqlite[[:space:]]*=.*"libsqlite3-sys/bundled"' Cargo.toml || {
        echo "bundled sqlite feature flag was not removed" >&2
        exit 1
      }

  - runs: |
      export CARGO_HOME="${PWD}/.cargo"
      export CARGO_TARGET_DIR="${PWD}/target"
      export LIBSQLITE3_SYS_USE_PKG_CONFIG=1
      export VW_VERSION="${{package.version}}"

      cargo build \
        --release \
        --features sqlite,mysql,postgresql

      scanelf -n target/release/vaultwarden | grep -q 'libsqlite3\.so' || {
        echo "vaultwarden is not dynamically linked against system sqlite" >&2
        scanelf -n target/release/vaultwarden >&2
        exit 1
      }

      web_vault_digest="$(curl -fsSL "https://hub.docker.com/v2/repositories/vaultwarden/web-vault/tags/v${{vars.web-vault-version}}" | jq -r '.digest')"
      test -n "${web_vault_digest}" && test "${web_vault_digest}" != "null"

      tmpweb="$(mktemp -d)"
      crane export "docker.io/vaultwarden/web-vault@${web_vault_digest}" - | tar -x -C "${tmpweb}" web-vault
      find "${tmpweb}/web-vault" -type f -name '*.map' -delete

      install -Dm755 target/release/vaultwarden "${{targets.destdir}}/usr/bin/vaultwarden"
      mkdir -p "${{targets.destdir}}/usr/share/vaultwarden"
      cp -a "${tmpweb}/web-vault" "${{targets.destdir}}/usr/share/vaultwarden/"
      install -Dm644 LICENSE.txt "${{targets.destdir}}/usr/share/licenses/vaultwarden/LICENSE.txt"
      mkdir -p "${{targets.destdir}}/data"

  - uses: strip

update:
  enabled: true
  github:
    identifier: dani-garcia/vaultwarden
    use-tag: true

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - busybox
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Basic vaultwarden package test
      runs: |
        test -x /usr/bin/vaultwarden
        test -f /usr/share/vaultwarden/web-vault/index.html
