contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - bitcoin-knots

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/bitcoind

work-dir: /data

environment:
  HOME: /data

paths:
  - path: /data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700

annotations:
  org.opencontainers.image.title: "bitcoin-knots"
  org.opencontainers.image.description: "Hardened bitcoin-knots builder image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/bitcoin-knots"
  org.opencontainers.image.licenses: "MIT"

archs:
  - x86_64
  - aarch64
