name: Build Hardened Images

on:
  push:
    branches: [main]
    paths:
      - "*/apko.yaml"
      - "*/melange.yaml"
      - ".github/workflows/build.yaml"
      - ".github/workflows/cve-report.yaml"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_HOST: ghcr.io
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  MELANGE_VERSION: v0.45.3
  APKO_VERSION: v1.1.14
  MELANGE_SIGNING_KEY: ${{ secrets.MELANGE_SIGNING_KEY }}
  MELANGE_SIGNING_KEY_PUB: ${{ secrets.MELANGE_SIGNING_KEY_PUB }}

jobs:
  ##############################################################################
  # DISCOVER PACKAGES AND IMAGES TO BUILD (outputs for downstream jobs)        #
  ##############################################################################
  discover:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
      images: ${{ steps.set.outputs.images }}
    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          PACKAGES=$(find . -maxdepth 2 -name melange.yaml \
            | sed 's|^\./||; s|/melange.yaml$||' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length>0))')

          IMAGES=$(find . -maxdepth 2 -name apko.yaml \
            | sed 's|^\./||; s|/apko.yaml$||' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length>0))')

          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

  ##############################################################################
  # GENERATE EPHEMERAL SIGNING KEY (PR only - secrets not available for forks) #
  ##############################################################################
  keygen:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Install melange
        run: |
          go install chainguard.dev/melange@${{ env.MELANGE_VERSION }}
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Generate ephemeral signing key
        run: |
          echo "Generating ephemeral key for PR build (not used for publishing)"
          melange keygen

      - name: Upload signing key
        uses: actions/upload-artifact@v4
        with:
          name: melange-ephemeral-key
          path: |
            melange.rsa
            melange.rsa.pub
          retention-days: 1

  ##############################################################################
  # BUILD MELANGE PACKAGES (native runners per architecture)                   #
  ##############################################################################
  melange-build:
    needs: [discover, keygen]
    if: always()
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.packages) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install melange
        run: |
          go install chainguard.dev/melange@${{ env.MELANGE_VERSION }}
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Download ephemeral signing key (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: melange-ephemeral-key
          path: .

      - name: Setup signing key (protected branch)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ env.MELANGE_SIGNING_KEY }}"     > melange.rsa
          echo "${{ env.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub
          chmod 600 melange.rsa

      - name: Build package with melange
        run: |
          chmod 600 melange.rsa
          melange build "${{ matrix.name }}/melange.yaml" \
            --arch "${{ matrix.arch }}" \
            --signing-key melange.rsa \
            --repository-append ./packages \
            --keyring-append ./melange.rsa.pub \
            --out-dir ./packages \
            --runner docker

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.name }}-${{ matrix.arch }}
          path: |
            packages/
            melange.rsa.pub
          retention-days: 1

  ##############################################################################
  # BUILD APKO-ONLY IMAGES (no melange dependency)                             #
  ##############################################################################
  build-apko:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: certutil
            primary_package: nss-tools

    steps:
      - uses: actions/checkout@v4

      - name: Install apko
        run: |
          go install chainguard.dev/apko@${{ env.APKO_VERSION }}
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - uses: sigstore/cosign-installer@v4.1.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with apko
        run: |
          apko build "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}" \
            "${{ matrix.name }}.tar" \
            --arch x86_64
          docker load < "${{ matrix.name }}.tar"

      - name: Scan with Grype
        id: grype
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}
          output-format: sarif
          fail-build: false

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-${{ matrix.name }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.name }}.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Generate CVE report
        shell: bash
        env:
          REGISTRY: ${{ env.REGISTRY_NAMESPACE }}
          IMAGE_NAME: ${{ matrix.name }}
          VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}":/work -w /work \
            anchore/grype:latest \
            "${REGISTRY}/${IMAGE_NAME}:${VERSION}" \
            -o json > "cve-report-${IMAGE_NAME}.json"

      - name: Upload CVE report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cve-report-${{ matrix.name }}
          path: cve-report-${{ matrix.name }}.json
          retention-days: 90

      - name: Extract version from SBOM
        id: version
        run: |
          VERSION=$(jq -r --arg pkg "${{ matrix.primary_package }}" '.packages[] | select(.name == $pkg) | .versionInfo' sbom-x86_64.spdx.json | head -1)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to extract version for ${{ matrix.primary_package }} from SBOM"
            exit 1
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          rm -f sbom-*.spdx.json

      - name: Publish image
        if: github.event_name != 'pull_request'
        run: |
          apko publish "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.tag }}" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:latest" \
            --arch x86_64,aarch64

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: |
            cosign sign --yes \
              "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.tag }}"

  ##############################################################################
  # BUILD MELANGE-BASED IMAGES (needs packages from melange-build)             #
  ##############################################################################
  build-melange:
    needs: [discover, melange-build]
    if: always() && needs.melange-build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.images) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install apko
        run: |
          go install chainguard.dev/apko@${{ env.APKO_VERSION }}
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - uses: sigstore/cosign-installer@v4.1.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download x86_64 packages
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*-x86_64
          merge-multiple: true
          path: ./packages-x86_64

      - name: Download aarch64 packages
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*-aarch64
          merge-multiple: true
          path: ./packages-aarch64

      - name: Merge packages
        run: |
          mkdir -p ./packages
          cp -r ./packages-x86_64/packages/* ./packages/ 2>/dev/null || true
          cp -r ./packages-aarch64/packages/* ./packages/ 2>/dev/null || true

          if [ -f ./packages-x86_64/melange.rsa.pub ]; then
            cp ./packages-x86_64/melange.rsa.pub ./melange.rsa.pub
          elif [ -f ./packages-aarch64/melange.rsa.pub ]; then
            cp ./packages-aarch64/melange.rsa.pub ./melange.rsa.pub
          fi

      - name: Setup signing key (protected branch)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ env.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub

      - name: Build image with apko
        run: |
          apko build "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}" \
            "${{ matrix.name }}.tar" \
            --arch x86_64 \
            --repository-append ./packages \
            --keyring-append ./melange.rsa.pub
          docker load < "${{ matrix.name }}.tar"

      - name: Scan with Grype
        id: grype
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}
          output-format: sarif
          fail-build: false

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-${{ matrix.name }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.name }}.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Generate CVE report
        shell: bash
        env:
          REGISTRY: ${{ env.REGISTRY_NAMESPACE }}
          IMAGE_NAME: ${{ matrix.name }}
          VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}":/work -w /work \
            anchore/grype:latest \
            "${REGISTRY}/${IMAGE_NAME}:${VERSION}" \
            -o json > "cve-report-${IMAGE_NAME}.json"

      - name: Upload CVE report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cve-report-${{ matrix.name }}
          path: cve-report-${{ matrix.name }}.json
          retention-days: 90

      - name: Resolve publish tag from built APK
        id: version
        run: |
          set -euo pipefail
          PKG_FILE=$(find ./packages/x86_64 -maxdepth 1 -type f -name "${{ matrix.name }}-*.apk" | head -1)
          if [ -z "$PKG_FILE" ]; then
            echo "::error::Could not find built APK for ${{ matrix.name }} in ./packages/x86_64"
            exit 1
          fi
          BASE=$(basename "$PKG_FILE" .apk)
          TAG=${BASE#${{ matrix.name }}-}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish image
        if: github.event_name != 'pull_request'
        run: |
          apko publish "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.tag }}" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:latest" \
            --arch x86_64,aarch64 \
            --repository-append ./packages \
            --keyring-append ./melange.rsa.pub

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: |
            cosign sign --yes \
              "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.tag }}"

  ##############################################################################
  # SUMMARY                                                                    #
  ##############################################################################
  summary:
    needs: [build-apko, build-melange]
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Check results
        run: |
          APKO="${{ needs.build-apko.result }}"
          MELANGE="${{ needs.build-melange.result }}"
          echo "build-apko: $APKO"
          echo "build-melange: $MELANGE"
          if [ "$APKO" != "success" ] || [ "$MELANGE" != "success" ]; then
            echo "::error::One or more image builds did not succeed (build-apko=$APKO, build-melange=$MELANGE)"
            exit 1
          fi

  ##############################################################################
  # CLEANUP OLD VERSIONS                                                       #
  ##############################################################################
  cleanup:
    needs: [build-apko, build-melange]
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Delete old untagged versions
        run: |
          gh api "/orgs/${{ github.repository_owner }}/packages?package_type=container" \
            --paginate --jq '.[].name' 2>/dev/null | \
          while read -r pkg; do
            echo "Cleaning old versions from $pkg..."
            gh api "/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions" \
              --paginate --jq '[.[] | select(.metadata.container.tags | length == 0)] | sort_by(.created_at) | reverse | .[4:] | .[].id' 2>/dev/null | \
            while read -r id; do
              echo "  Deleting version $id"
              gh api --method DELETE "/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions/$id" 2>/dev/null || true
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
