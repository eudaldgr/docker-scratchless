contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - libevent
    - libseccomp
    - openssl
    - xz
    - zlib
    - zstd
    - tzdata
    - tor

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/tor

paths:
  - path: /var/lib/tor
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /var/log/tor
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /run/tor
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

annotations:
  org.opencontainers.image.title: "tor"
  org.opencontainers.image.description: "Hardened Tor builder image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/tor"
  org.opencontainers.image.licenses: "BSD-3-Clause"

archs:
  - x86_64
  - aarch64
