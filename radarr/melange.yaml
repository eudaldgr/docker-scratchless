package:
  name: radarr
  version: 6.0.4.10291 # renovate: datasource=github-releases depName=Radarr/Radarr
  epoch: 0
  description: Movie collection manager for Usenet and BitTorrent users
  copyright:
    - license: GPL-3.0
  options:
    no-depends: true

vars:
  dotnet-sdk-version: "10"

environment:
  environment:
    BUILD_SOURCEBRANCHNAME: "v${{package.version}}"
    RADARRVERSION: "${{package.version}}"
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - bash
      - build-base
      - busybox
      - dotnet-10-sdk
      - nodejs
      - pnpm
      - yarn

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Radarr/Radarr.git
      tag: v${{package.version}}

  - runs: |
      case "${{build.arch}}" in
        x86_64)  rid="linux-x64" ;;
        aarch64) rid="linux-arm64" ;;
      esac

      echo '{"sdk":{"version":"${{vars.dotnet-sdk-version}}"}}' > global.json
      sed -i 's#<TreatWarningsAsErrors>true</TreatWarningsAsErrors>#<TreatWarningsAsErrors>false</TreatWarningsAsErrors>#' src/Directory.Build.props

      ./build.sh \
        --backend \
        --frontend \
        --packages \
        -f net8.0 \
        -r "${rid}"

      mkdir -p "${{targets.destdir}}/usr/lib/radarr" "${{targets.destdir}}/usr/bin"
      cp -a "_artifacts/${rid}/net8.0/Radarr/." "${{targets.destdir}}/usr/lib/radarr/"

      # In containers we do not use the in-app updater, debug symbols, or source maps.
      rm -rf "${{targets.destdir}}/usr/lib/radarr/Radarr.Update"
      find "${{targets.destdir}}/usr/lib/radarr" -type f \( -name '*.pdb' -o -name '*.js.map' \) -delete
      rm -f \
        "${{targets.destdir}}/usr/lib/radarr/ServiceInstall" \
        "${{targets.destdir}}/usr/lib/radarr/ServiceUninstall" \
        "${{targets.destdir}}/usr/lib/radarr/ServiceInstall."* \
        "${{targets.destdir}}/usr/lib/radarr/ServiceUninstall."* \
        "${{targets.destdir}}/usr/lib/radarr/createdump" \
        "${{targets.destdir}}/usr/lib/radarr/libmscordaccore.so" \
        "${{targets.destdir}}/usr/lib/radarr/libmscordbi.so"

  - uses: strip

update:
  enabled: true
  github:
    identifier: Radarr/Radarr
    use-tag: true
    tag-filter-prefix: v6.0.
    strip-prefix: v

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - busybox
  pipeline:
    - name: Mock test
      runs: |
        true
